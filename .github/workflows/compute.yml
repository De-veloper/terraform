name: compute module
run-name: "compute module - ${{ inputs.action }}"

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to run"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
        default: plan
      confirm:
        description: 'Type "destroy" to confirm (required only when action = destroy)'
        required: false
        type: string

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show selected action
        run: |
          echo "### Action: \`${{ inputs.action }}\` (module.compute)" >> "$GITHUB_STEP_SUMMARY"
          echo "Running action: ${{ inputs.action }}"

      - uses: hashicorp/setup-terraform@v3

      - name: Configure AWS profile
        run: |
          mkdir -p ~/.aws
          cat <<EOF >> ~/.aws/credentials
          [terraform-practice]
          aws_access_key_id = ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key = ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          EOF
          cat <<EOF >> ~/.aws/config
          [profile terraform-practice]
          region = us-east-1
          EOF

      - name: Guard destroy confirmation
        if: inputs.action == 'destroy'
        run: |
          if [ "${{ inputs.confirm }}" != "destroy" ]; then
            echo "::error::Refusing to destroy: 'confirm' input must be exactly 'destroy'."
            exit 1
          fi

      - name: Terraform fmt check
        run: terraform fmt -check -recursive modules/compute

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        if: inputs.action == 'plan'
        run: |
          terraform plan -no-color -target=module.compute -out=tfplan.bin | tee plan_output.txt
          terraform show -json tfplan.bin > plan.json

          {
            echo "## Terraform Plan: module.compute"
            echo ""
            grep -E "^(Plan:|No changes)" plan_output.txt || true
            echo ""
            python3 scripts/plan_summary.py plan.json
            echo ""
            echo "<details><summary>Raw plan output</summary>"
            echo ""
            echo '```'
            cat plan_output.txt
            echo '```'
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Terraform apply
        if: inputs.action == 'apply'
        run: terraform apply -target=module.compute -auto-approve

      - name: Terraform destroy
        if: inputs.action == 'destroy'
        run: terraform destroy -target=module.compute -auto-approve
